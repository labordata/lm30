name: Update Database

concurrency:
  group: database-build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '45 4 * * *'
  push:
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: install requirements
        run: |
          pip install -r requirements.txt

      - name: build database
        run: make -f update.mk update

      - name: setup asset
        run: |
          zip lm30.db.zip lm30.db

      - name: release
        if: github.ref == 'refs/heads/main'
        uses: WebFreak001/deploy-nightly@v3.0.0
        with:
          upload_url: https://uploads.github.com/repos/labordata/lm30/releases/338743208/assets{?name,label}
          release_id: 338743208
          asset_path: ./lm30.db.zip # path to archive to upload
          asset_name: lm30.db.zip # name to upload the release as
          asset_content_type: application/zip # required by GitHub API

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@v1
